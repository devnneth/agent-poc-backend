[DEFAULT]
prepend_sys_path = .
path_separator = os

[post_write_hooks]

[production]
# 로컬과 같은 마이그레이션 스크립트(env.py, versions/)를 공유
script_location = %(here)s/alembic
sqlalchemy.url = 

[alembic]
script_location = %(here)s/alembic
sqlalchemy.url = postgresql+psycopg://postgres:postgres@127.0.0.1:54322/postgres

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
